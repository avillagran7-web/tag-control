<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#2D6A4F"/>
  <!-- Círculo exterior brújula -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#fff" stroke-width="20" opacity="0.3"/>
  <!-- Aguja norte (apunta arriba-derecha = dirección/rumbo) -->
  <polygon points="256,130 280,256 256,240 232,256" fill="#A7F3D0"/>
  <!-- Aguja sur -->
  <polygon points="256,382 232,256 256,272 280,256" fill="#fff" opacity="0.5"/>
  <!-- Centro -->
  <circle cx="256" cy="256" r="14" fill="#fff"/>
  <!-- Tick marks cardinales -->
  <rect x="250" y="100" width="12" height="24" rx="6" fill="#fff" opacity="0.6"/>
  <rect x="250" y="388" width="12" height="24" rx="6" fill="#fff" opacity="0.6"/>
  <rect x="100" y="250" width="24" height="12" rx="6" fill="#fff" opacity="0.6"/>
  <rect x="388" y="250" width="24" height="12" rx="6" fill="#fff" opacity="0.6"/>
</svg>
